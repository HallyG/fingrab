name: CI

on:
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417
        with:
          go-version-file: "go.mod"
          cache: true
          cache-dependency-path: go.sum
      - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20
        with:
          version: v2.4.0
          args: --verbose --timeout=3m
  tests:
    strategy:
      matrix:
        os: [ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417
        with:
          go-version-file: "go.mod"
          cache: true
          cache-dependency-path: go.sum
      - name: Run tests
        run: go test ./... -timeout 10s -race -coverprofile=coverage.txt -covermode=atomic
      - name: Prepare artifact name
        id: prepare
        run: |
          sanitized_branch_name=$(echo "${GITHUB_REF_NAME}" | tr '/' '-')
          echo "branch_name=${sanitized_branch_name}" >> $GITHUB_OUTPUT
      - name: Upload test coverage
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: coverage-${{ steps.prepare.outputs.branch_name }}-${{ matrix.os }}-${{ github.run_number }}
          path: coverage.txt
          retention-days: 1
